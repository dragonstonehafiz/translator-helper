<div class="confirm-dialog-backdrop" (click)="onBackdropClick()">
  <div
    class="confirm-dialog"
    role="dialog"
    aria-modal="true"
    [attr.aria-label]="dialog.title"
    (click)="onPanelClick($event)">
    <div class="dialog-body">
      <h2>{{ dialog.title }}</h2>
      <p class="dialog-message">{{ dialog.message }}</p>
    </div>

    <div class="dialog-actions">
      <button type="button" class="cancel-btn" (click)="cancelled.emit()">{{ dialog.cancelLabel }}</button>
      <app-primary-button (click)="confirmed.emit()">
        {{ dialog.confirmLabel }}
      </app-primary-button>
    </div>
  </div>
</div>

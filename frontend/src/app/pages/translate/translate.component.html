<div class="page-container">
  <div class="header-container">
    <h1>Translate</h1>
    <app-tooltip-icon tooltip="Translate text and subtitle files"></app-tooltip-icon>
  </div>

  <div class="form-section">
    <app-subsection
      title="Series"
      tooltip="Select the library series to use as translation context">

      <div class="form-group">
        <label for="seriesSelect">Series</label>
        <select id="seriesSelect" [(ngModel)]="selectedSeriesId" (ngModelChange)="onSeriesSelected($event)">
          <option [value]="null">— None —</option>
          <option *ngFor="let s of seriesList" [value]="s.id">{{ s.name }} ({{ s.input_lang }} → {{ s.output_lang }})</option>
        </select>
      </div>
    </app-subsection>

    <app-tabs>
      <app-tab label="Translate Line">
        <app-subsection
          title="Translate Line"
          tooltip="Translate a single line of text">

          <div class="form-row">
            <div class="form-group">
              <label for="lineInputLanguage">Input Language</label>
              <select id="lineInputLanguage" [(ngModel)]="lineInputLanguage">
                <option *ngFor="let lang of languageOptions" [value]="lang.code">{{ lang.name }} ({{ lang.code }})</option>
              </select>
            </div>
            <div class="form-group">
              <label for="lineOutputLanguage">Output Language</label>
              <select id="lineOutputLanguage" [(ngModel)]="lineOutputLanguage">
                <option *ngFor="let lang of languageOptions" [value]="lang.code">{{ lang.name }} ({{ lang.code }})</option>
              </select>
            </div>
          </div>

          <div class="translate-field-wrapper" [class.is-loading]="isTranslatingLine">
            <app-text-field
              label="Text to Translate"
              placeholder="Enter text to translate..."
              [rows]="4"
              [initialReadMode]="false"
              [(ngModel)]="lineTextToTranslate">
            </app-text-field>
            <div class="translate-field-overlay" *ngIf="isTranslatingLine">
              <app-loading-text-indicator text="Translating Line..." color="#667eea" size="1.2rem"></app-loading-text-indicator>
            </div>
          </div>

          <app-primary-button [fullWidth]="true" (click)="translateLine()" [disabled]="!lineTextToTranslate || isAnyTaskRunning()">
            {{ isTranslatingLine ? 'Translating...' : 'Translate Line' }}
          </app-primary-button>

          <app-text-field
            label="Translation Result"
            placeholder="Translation will appear here..."
            [rows]="4"
            [(ngModel)]="lineTranslationResult">
          </app-text-field>
        </app-subsection>
      </app-tab>

      <app-tab label="Translate File">
        <app-subsection
          title="Translate File"
          tooltip="Translate an entire subtitle file">

          <app-file-upload
            accept=".ass,.srt"
            placeholder="Upload Subtitle File"
            subtext=".ass / .srt"
            [selectedFiles]="fileToTranslate ? [fileToTranslate] : []"
            (filesSelected)="onSubtitleFileSelected($event)">
          </app-file-upload>

          <div class="form-row">
            <div class="form-group">
              <label for="fileInputLanguage">Input Language</label>
              <select id="fileInputLanguage" [(ngModel)]="fileInputLanguage">
                <option *ngFor="let lang of languageOptions" [value]="lang.code">{{ lang.name }} ({{ lang.code }})</option>
              </select>
            </div>
            <div class="form-group">
              <label for="fileOutputLanguage">Output Language</label>
              <select id="fileOutputLanguage" [(ngModel)]="fileOutputLanguage">
                <option *ngFor="let lang of languageOptions" [value]="lang.code">{{ lang.name }} ({{ lang.code }})</option>
              </select>
            </div>
            <div class="form-group context-window-group">
              <label for="batchSize">
                Batch Size
                <app-tooltip-icon tooltip="Controls how many subtitle lines are translated per request. Larger batch sizes reduce the number of inference calls and are usually faster overall, but each batch may take longer and be more error-prone. Smaller batch sizes mean more calls, which is usually slower overall and can reduce context across lines."></app-tooltip-icon>
              </label>
              <input type="number" id="batchSize" [(ngModel)]="batchSize" min="1" max="10">
            </div>
          </div>

          <app-primary-button [fullWidth]="true" (click)="translateFile()" [disabled]="!fileToTranslate || isAnyTaskRunning()">
            {{ isTranslatingFile ? 'Translating...' : 'Translate File' }}
          </app-primary-button>
        </app-subsection>
      </app-tab>

      <app-tab label="Review Translation">
        <app-subsection
          title="Review Translation"
          tooltip="Review the active translated subtitle file against the original and correct flagged lines">

          <div class="upload-group">
            <p class="upload-label">Original File</p>
            <app-file-upload
              accept=".ass,.srt"
              placeholder="Upload Original Subtitle File"
              subtext=".ass / .srt"
              [selectedFiles]="fileToTranslate ? [fileToTranslate] : []"
              (filesSelected)="onSubtitleFileSelected($event)">
            </app-file-upload>
          </div>

          <div class="upload-group">
            <p class="upload-label">Translated File</p>
            <app-file-upload
              accept=".ass,.srt"
              placeholder="Upload Translated Subtitle File"
              subtext=".ass / .srt"
              [selectedFiles]="translatedFileToReview ? [translatedFileToReview] : []"
              (filesSelected)="onTranslatedSubtitleFileSelected($event)">
            </app-file-upload>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label for="reviewInputLanguage">Input Language</label>
              <select id="reviewInputLanguage" [(ngModel)]="fileInputLanguage">
                <option *ngFor="let lang of languageOptions" [value]="lang.code">{{ lang.name }} ({{ lang.code }})</option>
              </select>
            </div>
            <div class="form-group">
              <label for="reviewOutputLanguage">Output Language</label>
              <select id="reviewOutputLanguage" [(ngModel)]="fileOutputLanguage">
                <option *ngFor="let lang of languageOptions" [value]="lang.code">{{ lang.name }} ({{ lang.code }})</option>
              </select>
            </div>
          </div>

          <app-primary-button [fullWidth]="true" (click)="reviewTranslatedFile()" [disabled]="!fileToTranslate || !translatedFileToReview || isAnyTaskRunning()">
            {{ isReviewingTranslatedFile ? 'Reviewing...' : 'Review Translation' }}
          </app-primary-button>
        </app-subsection>
      </app-tab>

      <app-tab label="Downloads">
        <app-subsection
          *ngFor="let section of downloadSections"
          [title]="section.title"
          [tooltip]="section.tooltip">

          <app-downloads-list
            [files]="section.files"
            [isLoading]="section.isLoading"
            [error]="section.error"
            [deletingFilename]="section.deletingFilename"
            (refresh)="refreshDownloadSection(section)"
            (download)="downloadFile(section, $event)"
            (delete)="deleteFile(section, $event)">
          </app-downloads-list>
        </app-subsection>
      </app-tab>
    </app-tabs>
  </div>
</div>
